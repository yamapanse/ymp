<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブロック崩し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      color: #eee;
    }
    h1 {
      margin-bottom: 12px;
      font-size: 1.8rem;
      letter-spacing: 4px;
      color: #e94560;
    }
    #info {
      display: flex;
      gap: 40px;
      margin-bottom: 12px;
      font-size: 1rem;
    }
    #info span { color: #f0a500; font-weight: bold; }
    canvas {
      border: 2px solid #e94560;
      border-radius: 4px;
      background: #16213e;
      display: block;
    }
    #message {
      margin-top: 14px;
      font-size: 1.1rem;
      min-height: 1.5em;
      color: #0f3460;
    }
    #message.show { color: #e94560; }
    #restart {
      margin-top: 10px;
      padding: 8px 24px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      display: none;
    }
    #restart:hover { background: #c73652; }
    #controls {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <h1>ブロック崩し</h1>
  <div id="info">
    <div>スコア: <span id="score">0</span></div>
    <div>ライフ: <span id="lives">3</span></div>
    <div>レベル: <span id="level">1</span></div>
  </div>
  <canvas id="game" width="480" height="400"></canvas>
  <div id="message"></div>
  <button id="restart">もう一度プレイ</button>
  <div id="controls">← → キーまたはマウスでパドルを操作</div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const levelEl = document.getElementById('level');
    const messageEl = document.getElementById('message');
    const restartBtn = document.getElementById('restart');

    const W = canvas.width;
    const H = canvas.height;

    // ゲーム状態
    let score, lives, level, running, animId;

    // ボール
    const ball = { r: 8 };

    // パドル
    const paddle = { w: 80, h: 10, y: H - 30 };

    // ブロック設定
    const BLOCK_ROWS = 4;
    const BLOCK_COLS = 8;
    const BLOCK_W = 50;
    const BLOCK_H = 18;
    const BLOCK_PAD = 6;
    const BLOCK_OFFSET_X = (W - (BLOCK_W + BLOCK_PAD) * BLOCK_COLS + BLOCK_PAD) / 2;
    const BLOCK_OFFSET_Y = 50;

    const ROW_COLORS = ['#e94560', '#f0a500', '#0f9b8e', '#5b8dd9'];

    let blocks = [];
    let keys = {};

    // 初期化
    function init() {
      score = 0;
      lives = 3;
      level = 1;
      updateUI();
      messageEl.textContent = '';
      messageEl.classList.remove('show');
      restartBtn.style.display = 'none';
      initLevel();
      if (animId) cancelAnimationFrame(animId);
      running = true;
      loop();
    }

    function initLevel() {
      // ボール
      ball.x = W / 2;
      ball.y = H / 2;
      const speed = 3 + (level - 1) * 0.5;
      const angle = (-Math.PI / 2) + (Math.random() - 0.5) * (Math.PI / 3);
      ball.vx = speed * Math.cos(angle);
      ball.vy = speed * Math.sin(angle);

      // パドル
      paddle.x = (W - paddle.w) / 2;

      // ブロック生成
      blocks = [];
      for (let r = 0; r < BLOCK_ROWS; r++) {
        for (let c = 0; c < BLOCK_COLS; c++) {
          blocks.push({
            x: BLOCK_OFFSET_X + c * (BLOCK_W + BLOCK_PAD),
            y: BLOCK_OFFSET_Y + r * (BLOCK_H + BLOCK_PAD),
            w: BLOCK_W,
            h: BLOCK_H,
            color: ROW_COLORS[r % ROW_COLORS.length],
            alive: true,
          });
        }
      }
    }

    function updateUI() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      levelEl.textContent = level;
    }

    // 入力
    document.addEventListener('keydown', e => { keys[e.key] = true; });
    document.addEventListener('keyup', e => { keys[e.key] = false; });
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      paddle.x = e.clientX - rect.left - paddle.w / 2;
    });

    function update() {
      // パドル移動
      const speed = 6;
      if (keys['ArrowLeft'] || keys['a']) paddle.x -= speed;
      if (keys['ArrowRight'] || keys['d']) paddle.x += speed;
      paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

      // ボール移動
      ball.x += ball.vx;
      ball.y += ball.vy;

      // 壁反射
      if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -1; }
      if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx *= -1; }
      if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; }

      // パドル衝突
      if (
        ball.y + ball.r >= paddle.y &&
        ball.y + ball.r <= paddle.y + paddle.h + Math.abs(ball.vy) &&
        ball.x >= paddle.x &&
        ball.x <= paddle.x + paddle.w &&
        ball.vy > 0
      ) {
        ball.vy *= -1;
        // パドルの当たった位置で角度を変える
        const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        ball.vx = hit * 4;
        ball.y = paddle.y - ball.r;
      }

      // ボールがフィールド外に落ちた
      if (ball.y - ball.r > H) {
        lives--;
        updateUI();
        if (lives <= 0) {
          gameOver();
          return;
        }
        // リスポーン
        ball.x = W / 2;
        ball.y = H / 2;
        const speed2 = 3 + (level - 1) * 0.5;
        ball.vx = speed2 * (Math.random() > 0.5 ? 1 : -1);
        ball.vy = -speed2;
      }

      // ブロック衝突
      for (const b of blocks) {
        if (!b.alive) continue;
        if (
          ball.x + ball.r > b.x &&
          ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y &&
          ball.y - ball.r < b.y + b.h
        ) {
          b.alive = false;
          score += 10 * level;
          updateUI();

          // どちらの面に当たったか判定
          const overlapLeft = ball.x + ball.r - b.x;
          const overlapRight = b.x + b.w - (ball.x - ball.r);
          const overlapTop = ball.y + ball.r - b.y;
          const overlapBottom = b.y + b.h - (ball.y - ball.r);
          const minH = Math.min(overlapLeft, overlapRight);
          const minV = Math.min(overlapTop, overlapBottom);
          if (minH < minV) ball.vx *= -1;
          else ball.vy *= -1;

          break;
        }
      }

      // 全ブロック破壊
      if (blocks.every(b => !b.alive)) {
        level++;
        updateUI();
        initLevel();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // ブロック描画
      for (const b of blocks) {
        if (!b.alive) continue;
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h, 3);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.roundRect(b.x, b.y, b.w, b.h / 3, 3);
        ctx.fill();
      }

      // パドル描画
      const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
      grad.addColorStop(0, '#f0a500');
      grad.addColorStop(1, '#c87d00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 5);
      ctx.fill();

      // ボール描画
      const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
      ballGrad.addColorStop(0, '#ffffff');
      ballGrad.addColorStop(1, '#e94560');
      ctx.fillStyle = ballGrad;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fill();
    }

    function gameOver() {
      running = false;
      cancelAnimationFrame(animId);
      messageEl.textContent = `ゲームオーバー！ スコア: ${score}`;
      messageEl.classList.add('show');
      restartBtn.style.display = 'inline-block';
    }

    function loop() {
      if (!running) return;
      update();
      draw();
      animId = requestAnimationFrame(loop);
    }

    restartBtn.addEventListener('click', init);

    // コンテキストに roundRect がない古いブラウザ対応
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
      };
    }

    init();
  </script>
</body>
</html>
